services:
  - type: web
    name: attendx
    env: node
    plan: starter
    region: oregon
    rootDir: temp_unzip/attendx-render
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: attendx-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: APP_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: attendx-db
    plan: starter
    region: oregon
