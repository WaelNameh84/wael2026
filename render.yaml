services:
  - type: web
    name: attendx
    runtime: node
    buildCommand: npm install -g pnpm && pnpm install && pnpm --filter @workspace/attendx run build
    startCommand: node artifacts/attendx/server/dist/index.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
